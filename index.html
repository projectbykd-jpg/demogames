<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOLTOTO - Situs Game Online</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://i.ibb.co/9kwxLB1K/image.png" alt="LOLTOTO">
    </div>

    <div class="menu">
        <a href="#home">Home</a>
        <a href="#games">Games</a>
        <a href="#promo">Promo</a>
        <a href="#contact">Contact</a>
    </div>

    <button class="login-btn">LOGIN</button>
</header>

<section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>WELCOME TO LOLTOTO</h1>
        <p>Platform Game Online Modern dengan pengalaman bermain terbaik.</p>

        <div class="hero-btns">
            <button class="register-btn">DAFTAR SEKARANG</button>
            <button class="download-btn">DOWNLOAD APP</button>
        </div>
    </div>
</section>

<section id="games" class="games">

    <h2>GAME POPULER</h2>

    <div class="game-grid">

        <a href="roulette.html" class="game-card">
            <i class="fas fa-circle-dot"></i>
            <h3>Roulette</h3>
        </a>

        <a href="baccarat.html" class="game-card">
            <i class="fas fa-coins"></i>
            <h3>Baccarat</h3>
        </a>

        <a href="mines.html" class="game-card">
            <i class="fas fa-bomb"></i>
            <h3>Mines</h3>
        </a>

    </div>

</section>

<section class="stats">

    <div class="stat">
        <h3>15.000+</h3>
        <span>Member Online</span>
    </div>

    <div class="stat">
        <h3>24/7</h3>
        <span>Customer Service</span>
    </div>

    <div class="stat">
        <h3>99.9%</h3>
        <span>Server Uptime</span>
    </div>

</section>

<footer>
    © 2026 LOLTOTO. All Rights Reserved.
</footer>

<script src="script.js"></script>
</body>
</html>
